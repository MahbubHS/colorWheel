<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Tailwind CSS Color Wheel 🛞</title>
</head>

<body class="flex justify-center items-center h-screen bg-gray-900 relative">
  
  <select id="mode-select" class="absolute top-4 right-4 inline-flex justify-center overflow-hidden rounded-full px-2 py-2 text-sm/6 font-medium text-zinc-400 outline-none ring-1 ring-zinc-600/20 transition ring-inset hover:bg-zinc-600/2.5 hover:text-zinc-900">
    <option value="normal">Normal</option>
    <option value="bg">Background</option>
    <option value="text">Text Color</option>
    <option value="color-picker">Color Picker</option>
  </select>
  
  <h1 id="page-title" class="absolute top-32 text-2xl font-bold text-white">Color Picker</h1>
  <svg id="circle-svg" viewBox="0 0 500 500" class="w-full"></svg>
  
  <div id="display" class="absolute bottom-5 text-white *:font-mono">
    <p id="background"></p>
    <p id="text"></p>
  </div>
  
  <script>
    const svg = document.getElementById('circle-svg');
    const colors = ["red", "orange", "amber", "yellow", "lime", "green", "emerald", "teal", "cyan", "sky", "blue", "indigo", "violet", "purple", "fuchsia", "pink", "rose", "slate", "gray", "zinc", "neutral", "stone", "mauve", "olive", "taupe", "mist"];
    const shades = [950, 900, 800, 700, 600, 500, 400, 300, 200, 100, 50];
    
    let radius = 250;
    const centerX = 250;
    const centerY = 250;
    const shadesL = shades.length;
    const colorsL = colors.length;
    const display = document.getElementById('display');
    let mode = 'normal';
    let textClass = "text-white"
    
    document.getElementById('mode-select').addEventListener('change', (e) => {
      mode = e.target.value;
      if (mode === 'normal') {
        display.classList.remove(...display.classList);
        display.classList.add('hidden');
        document.body.classList.remove(...document.body.classList);
        document.body.classList.add('flex', 'justify-center', 'items-center', 'h-screen', 'bg-gray-900', 'relative');
        const title = document.getElementById('page-title');
        title.classList.remove(...title.classList);
        title.classList.add('absolute', 'top-32', 'text-2xl', 'font-bold', 'text-white');
        textClass = "text-white";
      } else {
        display.classList.remove(...display.classList);
        display.classList.add('absolute', '*:font-mono', 'bottom-5', textClass);
      }
    });
    
    for (let i = 0; i < shadesL; i++) {
      let currentShade = shades[i];
      for (let j = 0; j < colorsL; j++) {
        let startAngle = (j * 2 * Math.PI) / colorsL;
        let endAngle = ((j + 1) * 2 * Math.PI) / colorsL;
        let x1 = centerX + radius * Math.cos(startAngle);
        let y1 = centerY + radius * Math.sin(startAngle);
        let x2 = centerX + radius * Math.cos(endAngle);
        let y2 = centerY + radius * Math.sin(endAngle);
        let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        let d = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2} Z`;
        path.setAttribute("d", d);
        path.setAttribute("stroke", "black");
        path.setAttribute("stroke-width", ".5");
        
        path.setAttribute("class", `fill-${colors[j % colorsL]}-${currentShade} hover:opacity-80 transition-all duration-200 cursor-pointer stroke-[.02px] stroke-current stroke-cap-round stroke-join-miter`);
        path.addEventListener('click', () => {
          const selectedColor = `${colors[j % colorsL]}-${currentShade}`;
          const colorClass = `bg-${selectedColor}`;
          
          if (mode === 'color-picker') {
            navigator.clipboard.writeText(selectedColor);
            
          } else if (mode === 'bg') {
            document.body.classList.remove(...document.body.classList);
            document.body.classList.add('flex', 'justify-center', 'items-center', 'h-screen', colorClass);
            
            const last26Paths = Array.from(document.querySelectorAll('path')).slice(-26);
            last26Paths.forEach(path => {
              path.removeAttribute('class');
              path.setAttribute('class', `fill-${selectedColor} stroke-${selectedColor} stroke-1 stroke-cap-round stroke-join-miter`);
            });
            document.getElementById('background').innerText = `Background : ${selectedColor}`;
            
          } else if (mode === 'text') {
            const title = document.getElementById('page-title');
            textClass = `text-${selectedColor}`;
            title.classList.remove(...title.classList);
            title.classList.add('absolute', 'top-32', 'text-2xl', 'font-bold', textClass);
            
            display.classList.remove(...display.classList);
            display.classList.add('absolute', '*:font-mono', 'bottom-5', textClass);
            document.getElementById('text').innerText = `Color : ${selectedColor}`;
          }
        });
        
        svg.appendChild(path);
      }
      radius -= 20;
    }
    
    // Add center
    for (let j = 0; j < colorsL; j++) {
      let centerPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      let centerD = `M ${centerX} ${centerY} L ${centerX} ${centerY} A 0 0 0 0 1 ${centerX} ${centerY} Z`;
      centerPath.setAttribute("d", centerD);
      centerPath.setAttribute("class", "stroke-gray-900 fill-gray-900 stroke-1 stroke-cap-round stroke-join-miter");
      svg.appendChild(centerPath);
    }
  </script>
</body>

  </html>
