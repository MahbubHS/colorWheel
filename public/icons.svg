         0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42
         0 1.333-.946 2.418-2.157 2.418Z"/>
  </symbol>


  <!-- ───────────────────────────────────────────────────────────────
       DOCUMENTATION ICON  —  open book with a </> code motif
  ──────────────────────────────────────────────────────────────────── -->
  <symbol id="documentation-icon" viewBox="0 0 24 24">
    <!-- Book spine + pages -->
    <path stroke="currentColor" fill="none"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
    <path stroke="currentColor" fill="none"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/>
    <!-- </> code symbol inside the book -->
    <path stroke="currentColor" fill="none"
          stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
          d="M9.5 9.5 7.5 12l2 2.5M14.5 9.5 16.5 12l-2 2.5"/>
    <line x1="12.5" y1="8.5" x2="11.5" y2="15.5"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </symbol>


  <!-- ───────────────────────────────────────────────────────────────
       SOCIAL / USER ICON  —  person with a radiating connections star
  ──────────────────────────────────────────────────────────────────── -->
  <symbol id="social-icon" viewBox="0 0 24 24">
    <!-- User avatar head + shoulders -->
    <circle cx="9" cy="7" r="3.5"
            fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round"/>
    <path fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M2.5 21a6.5 6.5 0 0 1 13 0"/>
    <!-- Connection star  (top-right quadrant) -->
    <!-- Central node -->
    <circle cx="18.5" cy="9" r="1.2" fill="currentColor"/>
    <!-- Radiating spokes to 4 satellite nodes -->
    <line x1="18.5" y1="9" x2="21" y2="6.5"
          stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="18.5" y1="9" x2="21" y2="11.5"
          stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="18.5" y1="9" x2="15.5" y2="6.5"
          stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="18.5" y1="9" x2="15.5" y2="11.5"
          stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Satellite dots -->
    <circle cx="21"   cy="6.5"  r="1" fill="currentColor"/>
    <circle cx="21"   cy="11.5" r="1" fill="currentColor"/>
    <circle cx="15.5" cy="6.5"  r="1" fill="currentColor"/>
    <circle cx="15.5" cy="11.5" r="1" fill="currentColor"/>
  </symbol>

</svg>
