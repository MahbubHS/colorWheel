<svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  <!--
  ╔════════════════════════════════════════════════════════════════════╗
  ║  TAILWIND COLOR WHEEL  ·  Icon Sprite Sheet                       ║
  ║  ─────────────────────────────────────────────────────────────    ║
  ║  Design system: monoline, currentColor, 24 × 24 grid              ║
  ║  Stroke: 1.5 · round caps · round joins                           ║
  ║  Use: <svg><use href="icons.svg#symbol-id"/></svg>                ║
  ╚════════════════════════════════════════════════════════════════════╝
  -->


  <!-- ───────────────────────────────────────────────────────────────
       COLOR WHEEL ICON  —  mini prism-wheel, 6 segments + center dot
       Use for "brand mark" contexts, mode selectors, about page, etc.
  ──────────────────────────────────────────────────────────────────── -->
  <symbol id="color-wheel-icon" viewBox="0 0 24 24">
    <!--
      6 donut segments (60° each). Outer r=10, inner r=3.8, cx=cy=12.
      Each segment uses a unique color hinting at the full spectrum.
      Stroke = white hairline to create crisp separation at any size.
    -->
    <!-- Segment 0 · Red   –90°→–30° -->
    <path d="M12,8.2 L12,2 A10,10,0,0,1,20.66,7 L15.3,9.9 A3.8,3.8,0,0,0,12,8.2Z"
          fill="#f87171" stroke="white" stroke-width="0.4"/>
    <!-- Segment 1 · Yellow   –30°→30° -->
    <path d="M15.3,9.9 L20.66,7 A10,10,0,0,1,20.66,17 L15.3,14.1 A3.8,3.8,0,0,0,15.3,9.9Z"
          fill="#facc15" stroke="white" stroke-width="0.4"/>
    <!-- Segment 2 · Green   30°→90° -->
    <path d="M15.3,14.1 L20.66,17 A10,10,0,0,1,12,22 L12,15.8 A3.8,3.8,0,0,0,15.3,14.1Z"
          fill="#4ade80" stroke="white" stroke-width="0.4"/>
    <!-- Segment 3 · Cyan   90°→150° -->
    <path d="M12,15.8 L12,22 A10,10,0,0,1,3.34,17 L8.7,14.1 A3.8,3.8,0,0,0,12,15.8Z"
          fill="#22d3ee" stroke="white" stroke-width="0.4"/>
    <!-- Segment 4 · Blue   150°→210° -->
    <path d="M8.7,14.1 L3.34,17 A10,10,0,0,1,3.34,7 L8.7,9.9 A3.8,3.8,0,0,0,8.7,14.1Z"
          fill="#60a5fa" stroke="white" stroke-width="0.4"/>
    <!-- Segment 5 · Violet   210°→270° -->
    <path d="M8.7,9.9 L3.34,7 A10,10,0,0,1,12,2 L12,8.2 A3.8,3.8,0,0,0,8.7,9.9Z"
          fill="#c084fc" stroke="white" stroke-width="0.4"/>
    <!-- Hub -->
    <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.15"/>
    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
  </symbol>


