       X (TWITTER) ICON  —  The X logotype
  ──────────────────────────────────────────────────────────────────── -->
  <symbol id="x-icon" viewBox="0 0 24 24">
    <path fill="currentColor"
      d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747
