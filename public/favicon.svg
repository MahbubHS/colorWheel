<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>

    <!-- Per-segment radial gradients: dark shade at inner rim → pale tint at outer rim -->
    <!-- Mirrors how the app renders shade-50 (lightest) at the outer ring and shade-950 at the inner -->

    <radialGradient id="gr" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#7f1d1d"/>
      <stop offset="1"    stop-color="#fee2e2"/>
    </radialGradient>

    <radialGradient id="go" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#7c2d12"/>
      <stop offset="1"    stop-color="#ffedd5"/>
    </radialGradient>

    <radialGradient id="ga" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#78350f"/>
      <stop offset="1"    stop-color="#fef3c7"/>
    </radialGradient>

    <radialGradient id="gy" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#713f12"/>
      <stop offset="1"    stop-color="#fef9c3"/>
    </radialGradient>

    <radialGradient id="gl" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#365314"/>
      <stop offset="1"    stop-color="#ecfccb"/>
    </radialGradient>

    <radialGradient id="gg" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#14532d"/>
      <stop offset="1"    stop-color="#bbf7d0"/>
    </radialGradient>

    <radialGradient id="gem" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#064e3b"/>
      <stop offset="1"    stop-color="#99f6e4"/>
    </radialGradient>

    <radialGradient id="gc" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#164e63"/>
      <stop offset="1"    stop-color="#a5f3fc"/>
    </radialGradient>

    <radialGradient id="gb" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#1e3a8a"/>
      <stop offset="1"    stop-color="#bfdbfe"/>
    </radialGradient>

    <radialGradient id="gi" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#312e81"/>
      <stop offset="1"    stop-color="#c7d2fe"/>
    </radialGradient>

    <radialGradient id="gv" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#4c1d95"/>
      <stop offset="1"    stop-color="#ede9fe"/>
    </radialGradient>

    <radialGradient id="gf" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#701a75"/>
      <stop offset="1"    stop-color="#fae8ff"/>
    </radialGradient>

    <!-- Subtle inner shadow ring painted over everything -->
    <radialGradient id="gvignette" cx="16" cy="16" r="14.5" gradientUnits="userSpaceOnUse">
      <stop offset="0.30" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!--
    ╔══════════════════════════════════════════════════╗
    ║   12 DONUT SEGMENTS  (30° each, sweep clockwise)  ║
    ║   Center: 16,16  Outer r: 14.5  Inner r: 5       ║
    ║   Angles start at –90° (12 o'clock) → clockwise  ║
    ║   Path pattern per segment:                       ║
    ║     M ix1 iy1  L ox1 oy1                         ║
    ║     A 14.5 14.5 0 0 1 ox2 oy2                    ║
    ║     L ix2 iy2                                     ║
    ║     A 5 5 0 0 0 ix1 iy1  Z                       ║
    ╚══════════════════════════════════════════════════╝
  -->

  <!-- 0 · RED  –90° → –60° -->
  <path fill="url(#gr)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M16,11 L16,1.5 A14.5,14.5,0,0,1,23.25,3.44 L18.5,11.67 A5,5,0,0,0,16,11Z"/>

  <!-- 1 · ORANGE  –60° → –30° -->
  <path fill="url(#go)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M18.5,11.67 L23.25,3.44 A14.5,14.5,0,0,1,28.56,8.75 L20.33,13.5 A5,5,0,0,0,18.5,11.67Z"/>

  <!-- 2 · AMBER  –30° → 0° -->
  <path fill="url(#ga)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M20.33,13.5 L28.56,8.75 A14.5,14.5,0,0,1,30.5,16 L21,16 A5,5,0,0,0,20.33,13.5Z"/>

  <!-- 3 · YELLOW  0° → 30° -->
  <path fill="url(#gy)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M21,16 L30.5,16 A14.5,14.5,0,0,1,28.56,23.25 L20.33,18.5 A5,5,0,0,0,21,16Z"/>

  <!-- 4 · LIME  30° → 60° -->
  <path fill="url(#gl)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M20.33,18.5 L28.56,23.25 A14.5,14.5,0,0,1,23.25,28.56 L18.5,20.33 A5,5,0,0,0,20.33,18.5Z"/>

  <!-- 5 · GREEN  60° → 90° -->
  <path fill="url(#gg)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M18.5,20.33 L23.25,28.56 A14.5,14.5,0,0,1,16,30.5 L16,21 A5,5,0,0,0,18.5,20.33Z"/>

  <!-- 6 · EMERALD  90° → 120° -->
  <path fill="url(#gem)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M16,21 L16,30.5 A14.5,14.5,0,0,1,8.75,28.56 L13.5,20.33 A5,5,0,0,0,16,21Z"/>

  <!-- 7 · CYAN  120° → 150° -->
  <path fill="url(#gc)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M13.5,20.33 L8.75,28.56 A14.5,14.5,0,0,1,3.44,23.25 L11.67,18.5 A5,5,0,0,0,13.5,20.33Z"/>

  <!-- 8 · BLUE  150° → 180° -->
  <path fill="url(#gb)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M11.67,18.5 L3.44,23.25 A14.5,14.5,0,0,1,1.5,16 L11,16 A5,5,0,0,0,11.67,18.5Z"/>

  <!-- 9 · INDIGO  180° → 210° -->
  <path fill="url(#gi)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M11,16 L1.5,16 A14.5,14.5,0,0,1,3.44,8.75 L11.67,13.5 A5,5,0,0,0,11,16Z"/>

  <!-- 10 · VIOLET  210° → 240° -->
  <path fill="url(#gv)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M11.67,13.5 L3.44,8.75 A14.5,14.5,0,0,1,8.75,3.44 L13.5,11.67 A5,5,0,0,0,11.67,13.5Z"/>

  <!-- 11 · FUCHSIA  240° → 270° (closes back to –90°) -->
  <path fill="url(#gf)" stroke="white" stroke-width="0.5" stroke-linejoin="round"
        d="M13.5,11.67 L8.75,3.44 A14.5,14.5,0,0,1,16,1.5 L16,11 A5,5,0,0,0,13.5,11.67Z"/>

  <!-- Depth vignette: darkens the inner rim of all segments for perceived 3-D depth -->
  <circle cx="16" cy="16" r="14.5" fill="url(#gvignette)"/>

  <!-- Centre void — deep indigo, mimics the dark hole at the app's wheel hub -->
  <circle cx="16" cy="16" r="4.6"
          fill="#0f0720"
          stroke="rgba(255,255,255,0.12)"
          stroke-width="0.5"/>

  <!-- Specular highlight dot — tiny off-centre white glint for a glass-orb feel -->
  <circle cx="14.8" cy="14.8" r="1.1" fill="white" fill-opacity="0.18"/>

</svg>
