name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Type-check
        run: npm run type-check

      - name: 🔎 Lint
        run: npm run lint

      - name: 🎨 Format check
        run: npm run format:check

      - name: 🏗️ Build
        run: npm run build
        env:
          BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}

      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
          
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
